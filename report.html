<!DOCTYPE html>
<html>
<head>
    <title>Security Report - VulnX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid-bg"></div>

<section>
    <div class="panel report-panel">

        <h1 class="brand small-brand">VulnX</h1>
        <h2>Security Report</h2>
        <p class="target-line">Target: <strong id="reportUrl"></strong></p>

        <div class="score-section">

            <div>
                <div class="score-title">Security Score</div>
                <div class="score-circle">
    <svg width="180" height="180">
        <circle
            cx="90"
            cy="90"
            r="75"
            stroke="#1f2937"
            stroke-width="10"
            fill="none"
        />
        <circle
            id="progressRing"
            cx="90"
            cy="90"
            r="75"
            stroke="#00ff88"
            stroke-width="10"
            fill="none"
            stroke-linecap="round"
            stroke-dasharray="471"
            stroke-dashoffset="471"
            transform="rotate(-90 90 90)"
        />
    </svg>

    <div class="score-number">
        <span id="scoreValue">0</span>
        <small>/100</small>
    </div>
</div>
            </div>

            <div class="stats-box">
                <div class="stat secure">✔ <span id="secureCount">0</span> Secure</div>
                <div class="stat warning">⚠ <span id="warningCount">0</span> Warning</div>
                <div class="stat critical">✖ <span id="criticalCount">0</span> Critical</div>
            </div>

        </div>

        <h3 class="details-heading">Detailed Report</h3>
        <div id="detailedList" class="details-box"></div>

        <div class="btn-wrapper">
            <button id="scanAgainBtn">Scan Another Website</button>
        </div>

    </div>
</section>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span id="closeModal" class="close-btn">×</span>
        <h3 id="modalTitle"></h3>
        <div class="modal-section">
            <h4>Issue Checked</h4>
            <p id="modalIssue"></p>
        </div>
        <div class="modal-section">
            <h4>Why It Matters</h4>
            <p id="modalWhy"></p>
        </div>
        <div class="modal-section">
            <h4>How To Fix</h4>
            <p id="modalFix"></p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
