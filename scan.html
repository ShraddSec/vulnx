<!DOCTYPE html>
<html>
<head>
    <title>Scanning - VulnX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid-bg"></div>

<section>
    <div class="panel">

        <h2>Scanning in Progress</h2>
        <p class="target-line">Target: <strong id="scanningUrl"></strong></p>

        <div class="progress-label">Progress</div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="terminal" id="terminalLogs"></div>

        <p class="scan-note">This may take a few moments...</p>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
